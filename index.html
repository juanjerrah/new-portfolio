<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="" />
  <title></title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Skip link for accessibility -->
  <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>

  <!-- ══════════════════════════════════════
       NAVBAR
  ══════════════════════════════════════ -->
  <header class="navbar" role="banner">
    <nav class="navbar__inner" aria-label="Navegação principal">
      <a href="#hero" class="navbar__logo" aria-label="Ir para início">
        <span class="logo-bracket">&lt;</span>JJ<span class="logo-bracket">/&gt;</span>
      </a>

      <ul class="navbar__links" role="list"></ul>

      <button
        class="navbar__toggle"
        aria-label="Abrir menu de navegação"
        aria-expanded="false"
        aria-controls="mobile-menu"
      >
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </nav>

    <!-- Mobile menu -->
    <div class="mobile-menu" id="mobile-menu" aria-hidden="true" role="dialog" aria-label="Menu de navegação">
      <ul class="mobile-menu__links" role="list"></ul>
    </div>
  </header>

  <main id="main-content">

    <!-- ══════════════════════════════════════
         HERO SECTION
    ══════════════════════════════════════ -->
    <section id="hero" class="hero" aria-labelledby="hero-heading">
      <!-- Animated background grid -->
      <div class="hero__grid" aria-hidden="true"></div>
      <!-- Floating blobs -->
      <div class="hero__blob hero__blob--1" aria-hidden="true"></div>
      <div class="hero__blob hero__blob--2" aria-hidden="true"></div>

      <div class="hero__content">
        <p class="hero__greeting"></p>
        <h1 id="hero-heading" class="hero__name"></h1>
        <p class="hero__role">
          <span class="typewriter" id="typewriter" aria-live="polite"></span>
        </p>
        <p class="hero__description"></p>

        <div class="hero__actions">
          <a href="#projects" class="btn btn--primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </a>
          <a href="#contact" class="btn btn--secondary"></a>
        </div>

        <div class="hero__socials" aria-label="Redes sociais"></div>
      </div>

      <!-- Hero visual / code card -->
      <div class="hero__visual" aria-hidden="true">
        <div class="code-card">
          <div class="code-card__header">
            <span class="dot dot--red"></span>
            <span class="dot dot--yellow"></span>
            <span class="dot dot--green"></span>
            <span class="code-card__filename">juan.js</span>
          </div>
          <pre class="code-card__body"><code><span class="c-keyword">const</span> <span class="c-name">developer</span> <span class="c-op">=</span> {
  <span class="c-prop">name</span><span class="c-op">:</span> <span class="c-str">"Juan Jerrah"</span>,
  <span class="c-prop">role</span><span class="c-op">:</span> <span class="c-str">"Software Engineer"</span>,
  <span class="c-prop">stack</span><span class="c-op">:</span> [
    <span class="c-str">".NET"</span>, <span class="c-str">"Golang"</span>,
    <span class="c-str">"GraphQL"</span>, <span class="c-str">"React"</span>
  ],
  <span class="c-prop">speciality</span><span class="c-op">:</span> <span class="c-str">"Microservices"</span>,
  <span class="c-prop">available</span><span class="c-op">:</span> <span class="c-bool">true</span>
};</code></pre>
        </div>
      </div>

      <!-- Scroll hint -->
      <div class="scroll-hint" aria-hidden="true">
        <span class="scroll-hint__text">Scroll</span>
        <div class="scroll-hint__line"></div>
      </div>
    </section>

    <!-- ══════════════════════════════════════
         ABOUT SECTION
    ══════════════════════════════════════ -->
    <section id="about" class="about section" aria-labelledby="about-heading">
      <div class="section__inner">
        <div class="section__label" aria-hidden="true"></div>
        <h2 id="about-heading" class="section__title"></h2>

        <div class="about__grid">
          <div class="about__text">
            <p></p>
            <p></p>

            <div class="tech-stack">
              <p class="tech-stack__label"></p>
              <ul class="tech-stack__list" role="list">
              </ul>
            </div>
          </div>

          <div class="about__stats">
            <div class="stat-card">
              <span class="stat-card__number" data-target="0">0</span>
              <span class="stat-card__suffix"></span>
              <p class="stat-card__label"></p>
            </div>
            <div class="stat-card">
              <span class="stat-card__number" data-target="0">0</span>
              <span class="stat-card__suffix"></span>
              <p class="stat-card__label"></p>
            </div>
            <div class="stat-card">
              <span class="stat-card__number" data-target="0">0</span>
              <span class="stat-card__suffix"></span>
              <p class="stat-card__label"></p>
            </div>
            <div class="stat-card">
              <span class="stat-card__number" data-target="0">0</span>
              <span class="stat-card__suffix"></span>
              <p class="stat-card__label"></p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ══════════════════════════════════════
         EXPERIENCE TIMELINE SECTION
    ══════════════════════════════════════ -->
    <section id="experience" class="experience section" aria-labelledby="experience-heading">
      <div class="section__inner">
        <div class="section__label" aria-hidden="true"></div>
        <h2 id="experience-heading" class="section__title"></h2>
        <p class="section__subtitle"></p>

        <div class="timeline" role="list" aria-label="Linha do tempo de experiências profissionais"></div>
      </div>
    </section>

    <!-- ══════════════════════════════════════
         PROJECTS SECTION
    ══════════════════════════════════════ -->
    <section id="projects" class="projects section" aria-labelledby="projects-heading">
      <div class="section__inner">
        <div class="section__label" aria-hidden="true"></div>
        <h2 id="projects-heading" class="section__title"></h2>
        <p class="section__subtitle"></p>

        <!-- Filter tabs -->
        <div class="projects__filters" role="tablist" aria-label="Filtrar projetos"></div>

        <div class="projects__grid" id="projects-grid" role="list"></div>

        <div class="projects__more">
          <a href="" target="_blank" rel="noopener noreferrer" class="btn btn--outline">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
            </svg>
          </a>
        </div>
      </div>
    </section>

    <!-- ══════════════════════════════════════
         CONTACT SECTION
    ══════════════════════════════════════ -->
    <section id="contact" class="contact section" aria-labelledby="contact-heading">
      <div class="contact__glow" aria-hidden="true"></div>
      <div class="section__inner">
        <div class="section__label" aria-hidden="true"></div>
        <h2 id="contact-heading" class="section__title"></h2>
        <p class="section__subtitle"></p>

        <div class="contact__layout">
          <!-- Contact form -->
          <div class="contact__form-wrapper">
            <form class="contact-form" id="contact-form" novalidate aria-label="Formulário de contato">
              <div class="form-group">
                <label for="name" class="form-label">
                  Nome <span class="required" aria-label="campo obrigatório">*</span>
                </label>
                <input
                  type="text"
                  id="name"
                  name="name"
                  class="form-input"
                  placeholder=""
                  autocomplete="name"
                  required
                  aria-required="true"
                  aria-describedby="name-error"
                />
                <span class="form-error" id="name-error" role="alert" aria-live="polite"></span>
              </div>

              <div class="form-group">
                <label for="email" class="form-label">
                  E-mail <span class="required" aria-label="campo obrigatório">*</span>
                </label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="form-input"
                  placeholder=""
                  autocomplete="email"
                  required
                  aria-required="true"
                  aria-describedby="email-error"
                />
                <span class="form-error" id="email-error" role="alert" aria-live="polite"></span>
              </div>

              <div class="form-group">
                <label for="subject" class="form-label">
                  Assunto <span class="required" aria-label="campo obrigatório">*</span>
                </label>
                <input
                  type="text"
                  id="subject"
                  name="subject"
                  class="form-input"
                  placeholder=""
                  autocomplete="off"
                  required
                  aria-required="true"
                  aria-describedby="subject-error"
                />
                <span class="form-error" id="subject-error" role="alert" aria-live="polite"></span>
              </div>

              <div class="form-group">
                <label for="message" class="form-label">
                  Mensagem <span class="required" aria-label="campo obrigatório">*</span>
                </label>
                <textarea
                  id="message"
                  name="message"
                  class="form-input form-textarea"
                  placeholder=""
                  rows="5"
                  required
                  aria-required="true"
                  aria-describedby="message-error"
                ></textarea>
                <span class="form-error" id="message-error" role="alert" aria-live="polite"></span>
              </div>

              <button type="submit" class="btn btn--primary btn--full" id="submit-btn">
                <span class="btn__text"></span>
                <span class="btn__spinner" aria-hidden="true"></span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="btn__icon">
                  <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 19-7z"/>
                </svg>
              </button>

              <!-- Success message -->
              <div class="form-success" id="form-success" role="alert" aria-live="polite" aria-hidden="true">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
              </div>
            </form>
          </div>

          <!-- Contact info -->
          <div class="contact__info">
            <h3 class="contact__info-title"></h3>

            <ul class="contact__channels" role="list"></ul>

            <!-- Availability badge -->
            <div class="availability-badge" aria-label="">
              <span class="availability-dot" aria-hidden="true"></span>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- ══════════════════════════════════════
       FOOTER
  ══════════════════════════════════════ -->
  <footer class="footer" role="contentinfo">
    <div class="footer__inner">
      <p class="footer__copy"></p>
      <a href="#hero" class="back-to-top" aria-label="Voltar ao topo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 15l-6-6-6 6"/>
        </svg>
      </a>
    </div>
  </footer>

  <!-- Toast notification -->
  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <script src="script.js"></script>
</body>
</html>
